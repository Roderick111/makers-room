<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Makers Room · Brutal Light</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  :root {
    --bg: #f4f1ea;
    --ink: #0a0907;
    --ink-2: #2a2620;
    --muted: #6b6760;
    --rule: rgba(10, 9, 7, 0.85);
    --rule-dotted: rgba(10, 9, 7, 0.18);

    --accent: #d2412c; /* ink-stamp red */
    --green: #1a6e3d;
    --amber: #b67307;

    --font-sans: "Geist", system-ui, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, Menlo, monospace;

    --pad-x: clamp(24px, 4vw, 80px);
    --row-pad-y: clamp(48px, 7vw, 96px);

    color-scheme: light;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-sans);
    font-size: 17px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  h1, h2, h3 { margin: 0; font-family: var(--font-sans); letter-spacing: -0.028em; line-height: 1.0; font-weight: 600; }
  p { margin: 0; text-wrap: pretty; }
  ul, ol, dl { padding: 0; margin: 0; list-style: none; }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--accent); color: #fff; }

  .wrap { max-width: 1480px; margin: 0 auto; padding-left: var(--pad-x); padding-right: var(--pad-x); }

  .top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 0 18px;
    border-bottom: 1px dotted var(--rule-dotted);
  }
  .top__brand { font-weight: 600; font-size: 16px; letter-spacing: -0.01em; }
  .top__brand-dot { display: inline-block; width: 7px; height: 7px; background: var(--accent); margin-right: 8px; vertical-align: middle; }
  .top__nav { display: flex; gap: 22px; font-family: var(--font-mono); font-size: 13px; color: var(--muted); }
  .top__nav a:hover { color: var(--ink); }

  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px 5px;
    border: 1px solid currentColor;
    border-radius: 3px;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.04em;
    color: var(--muted);
    line-height: 1;
    white-space: nowrap;
  }
  .pill--accent { color: var(--accent); }
  .pill--green { color: var(--green); }
  .pill--amber { color: var(--amber); }
  .pill__blip { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: blip 1.6s ease-in-out infinite; }
  @keyframes blip { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* Underlined block button (very brutal — no fill, just a heavy black outline) */
  .btn {
    display: inline-flex; align-items: center; gap: 12px;
    padding: 14px 22px;
    background: var(--ink);
    color: var(--bg);
    border: 1px solid var(--ink);
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.18s, color 0.18s;
  }
  .btn:hover { background: transparent; color: var(--ink); }
  .btn--ghost { background: transparent; color: var(--ink); border-color: var(--rule-dotted); }
  .btn--ghost:hover { border-color: var(--ink); }
  .btn--accent { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn--accent:hover { background: transparent; color: var(--accent); }

  /* Row layout — same brutal grid */
  .row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1.05fr);
    border-bottom: 1px dotted var(--rule-dotted);
    min-height: clamp(420px, 56vw, 620px);
  }
  .row__text {
    padding: var(--row-pad-y) clamp(24px, 4vw, 64px) var(--row-pad-y) 0;
    border-right: 1px dotted var(--rule-dotted);
    display: flex; flex-direction: column; gap: 28px;
    justify-content: space-between;
  }
  .row__text--noborder { border-right: 0; padding-right: 0; }
  .row__media {
    padding: 24px 0 24px clamp(24px, 4vw, 64px);
    display: flex; align-items: stretch;
  }
  .row__media-inner {
    flex: 1; min-height: 340px;
    border: 1px dotted var(--rule-dotted);
    position: relative;
    background: repeating-linear-gradient(135deg, transparent 0 18px, rgba(0,0,0,0.025) 18px 19px);
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
  }
  .row__media-inner > span { position: relative; z-index: 1; padding: 4px 10px; background: var(--bg); }
  .row__media-inner::after { content: ""; position: absolute; inset: 16px; border: 1px solid rgba(0,0,0,0.06); }

  .row--full { grid-template-columns: 1fr; }
  .row--full .row__text { border-right: 0; padding-right: 0; }

  .ttl {
    font-size: clamp(32px, 3.8vw, 56px);
    font-weight: 600;
    letter-spacing: -0.03em;
    line-height: 1.0;
    text-wrap: balance;
  }
  .ttl--lg {
    font-size: clamp(40px, 4.8vw, 76px);
    letter-spacing: -0.035em;
    line-height: 0.98;
  }
  .ttl em { font-style: normal; color: var(--accent); }

  .body { color: var(--ink-2); font-size: clamp(16px, 1.1vw, 18px); line-height: 1.55; max-width: 56ch; }
  .body p + p { margin-top: 14px; }
  .body--small { font-size: 14px; line-height: 1.55; color: var(--muted); }

  .eyebrow { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

  .bottom {
    display: flex; justify-content: space-between; align-items: center;
    padding: 28px 0 30px;
    font-family: var(--font-mono);
    font-size: 14px;
  }
  .bottom__links { display: flex; gap: 28px; color: var(--muted); }
  .bottom__links a:hover { color: var(--ink); }
  .bottom__pin { padding: 8px 14px; border: 1px solid var(--rule-dotted); color: var(--muted); }
  .bottom__pin:hover { color: var(--ink); border-color: var(--ink); }

  .diag { margin-top: 16px; display: grid; gap: 0; }
  .diag__item {
    display: grid; grid-template-columns: 42px 1fr;
    gap: 16px;
    padding: 16px 0;
    border-bottom: 1px dotted var(--rule-dotted);
    align-items: baseline;
  }
  .diag__n { font-family: var(--font-mono); font-size: 12px; color: var(--accent); }
  .diag__q { font-size: 18px; line-height: 1.4; }
  .diag__a { display: block; margin-top: 4px; color: var(--muted); font-size: 14px; }

  .twocol { display: grid; grid-template-columns: max-content 1fr; column-gap: 28px; }
  .twocol > * { padding: 12px 0; border-top: 1px dotted var(--rule-dotted); margin: 0; }
  .twocol > :last-child, .twocol > :nth-last-child(2) { border-bottom: 1px dotted var(--rule-dotted); }
  .twocol dt { color: var(--ink); }
  .twocol dd { color: var(--muted); }

  .steps { display: grid; gap: 0; }
  .step {
    display: grid; grid-template-columns: 60px 1fr; gap: 18px;
    padding: 22px 0;
    border-top: 1px dotted var(--rule-dotted);
  }
  .step:last-child { border-bottom: 1px dotted var(--rule-dotted); }
  .step__n { font-family: var(--font-mono); color: var(--muted); font-size: 12px; padding-top: 6px; }
  .step__t { font-size: clamp(22px, 2vw, 30px); font-weight: 500; letter-spacing: -0.015em; }
  .step__d { margin-top: 6px; color: var(--ink-2); font-size: 15.5px; line-height: 1.5; max-width: 60ch; }

  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1.2fr; gap: 28px; }
  .grid-3 .hd { font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.18em; padding-bottom: 10px; border-bottom: 1px dotted var(--rule-dotted); }
  .grid-3 .cell { padding: 16px 0; border-bottom: 1px dotted var(--rule-dotted); font-size: 15px; }
  .grid-3 .cell--art { font-weight: 500; }
  .grid-3 .cell--before { color: var(--muted); text-decoration: line-through; }
  .grid-3 .cell--now { color: var(--accent); }

  @media (max-width: 880px) {
    .row { grid-template-columns: 1fr; min-height: auto; }
    .row__text { border-right: 0; padding-right: 0; }
    .row__media { padding: 0 0 32px; }
    .row__media-inner { min-height: 240px; }
    .grid-3 { grid-template-columns: 1fr; }
    .grid-3 .hd { display: none; }
    .top__nav { gap: 14px; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="brutal-light.jsx"></script>
</head>
<body>
<div id="root"></div>
</body>
</html>
