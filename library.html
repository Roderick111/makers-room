<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Makers Room · Prompts Library</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  :root {
    --bg: #050505;
    --bg-2: #0d0d0d;
    --ink: #ffffff;
    --ink-2: #d4d4d4;
    --muted: #7a7a7a;
    --rule: #1d1d1d;
    --rule-dotted: rgba(255, 255, 255, 0.14);

    --green: #6bff8e;
    --red: #ff5a4d;
    --amber: #ffb541;

    --font-sans: "Geist", system-ui, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, Menlo, monospace;

    --pad-x: clamp(24px, 4vw, 80px);

    --text-sm: 16px;
    --text-base: 18px;

    color-scheme: dark;
  }

  [data-theme="light"] {
    --bg: #ffffff;
    --bg-2: #f5f5f0;
    --ink: #050505;
    --ink-2: #333333;
    --muted: #7c7770;
    --rule: rgba(5, 5, 5, 0.95);
    --rule-dotted: rgba(5, 5, 5, 0.12);

    --green: #ff3b1f;
    --red: #ff5a4d;
    --amber: #e09000;

    color-scheme: light;
  }
  [data-theme="light"] ::selection { background: var(--green); color: #fff; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-sans);
    font-size: var(--text-base);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  h1, h2, h3 { margin: 0; font-family: var(--font-sans); letter-spacing: -0.025em; line-height: 1.02; font-weight: 600; }
  p { margin: 0; text-wrap: pretty; }
  ul, ol, dl { padding: 0; margin: 0; list-style: none; }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--green); color: #000; }

  .wrap {
    max-width: 1480px;
    margin: 0 auto;
    padding-left: var(--pad-x);
    padding-right: var(--pad-x);
  }

  .top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 0 18px;
    border-bottom: 1px dotted var(--rule-dotted);
  }
  .top__brand { font-weight: 600; font-size: 16px; letter-spacing: -0.01em; }
  .top__brand-dot { display: inline-block; width: 7px; height: 7px; background: var(--green); margin-right: 8px; vertical-align: middle; }
  .top__nav { display: flex; gap: 22px; font-family: var(--font-mono); font-size: var(--text-sm); color: var(--muted); }
  .top__nav a:hover { color: var(--ink); }

  .ttl {
    font-size: clamp(32px, 3.8vw, 56px);
    font-weight: 600;
    letter-spacing: -0.03em;
    line-height: 1.0;
    text-wrap: balance;
  }
  .ttl--lg {
    font-size: clamp(40px, 4.8vw, 76px);
    letter-spacing: -0.035em;
    line-height: 0.98;
  }

  .body { color: var(--ink-2); font-size: clamp(16px, 1.1vw, 18px); line-height: 1.55; max-width: 56ch; }

  button { border-radius: 0; }
  button:hover { opacity: 0.85; }
  input:focus { border-color: var(--green) !important; }

  @media (max-width: 700px) {
    div[style*="grid-template-columns: repeat(2"] {
      grid-template-columns: 1fr !important;
    }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="library.jsx"></script>
</head>
<body>
<script>(function(){var t=localStorage.getItem("mr-theme");if(!t){t=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light"}document.documentElement.setAttribute("data-theme",t)})()</script>
<div id="root"></div>
</body>
</html>
