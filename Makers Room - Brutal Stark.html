<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Makers Room · Brutal Stark</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --ink: #050505;
    --muted: #7c7770;
    --whisper: #c8c4ba;
    --rule: rgba(5, 5, 5, 0.95);
    --hair: rgba(5, 5, 5, 0.12);
    --accent: #ff3b1f;

    --font-sans: "Geist", system-ui, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, Menlo, monospace;

    --pad-x: clamp(24px, 4vw, 80px);
    color-scheme: light;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-sans);
    font-size: 18px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3 { margin: 0; font-family: var(--font-sans); letter-spacing: -0.04em; line-height: 0.93; font-weight: 600; }
  p { margin: 0; }
  ul, ol, dl { padding: 0; margin: 0; list-style: none; }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--accent); color: #fff; }

  .wrap { max-width: 1480px; margin: 0 auto; padding-left: var(--pad-x); padding-right: var(--pad-x); }

  /* Top bar */
  .top {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
    padding-top: 18px;
    padding-bottom: 18px;
    display: flex; justify-content: space-between; align-items: baseline;
    border-bottom: 1px solid var(--ink);
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .top__l, .top__r { display: flex; gap: 24px; align-items: baseline; }
  .top__brand { color: var(--ink); font-weight: 600; }
  .top__r a:hover { color: var(--accent); }

  /* Catalog row — each section is a row of: number | giant headline | small body */
  .entry {
    display: grid;
    grid-template-columns: 120px minmax(0, 1.6fr) minmax(0, 1fr);
    gap: clamp(32px, 4vw, 80px);
    padding-top: clamp(60px, 7vw, 100px);
    padding-bottom: clamp(60px, 7vw, 100px);
    border-bottom: 1px solid var(--ink);
    align-items: start;
  }
  .entry__n {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.16em;
    color: var(--muted);
    text-transform: uppercase;
    padding-top: 14px;
    position: sticky;
    top: 90px;
    align-self: start;
  }
  .entry__n strong { display: block; color: var(--ink); font-weight: 600; margin-bottom: 6px; }

  .entry__ttl {
    font-size: clamp(56px, 8vw, 132px);
    line-height: 0.9;
    letter-spacing: -0.045em;
    font-weight: 600;
    text-wrap: balance;
  }
  .entry__ttl em { font-style: normal; color: var(--accent); }
  .entry__ttl s { text-decoration-thickness: 6px; color: var(--whisper); }

  .entry__aside {
    padding-top: 22px;
    color: var(--ink);
    font-size: 16px;
    line-height: 1.6;
    max-width: 44ch;
  }
  .entry__aside p + p { margin-top: 14px; }
  .entry__aside .quiet { color: var(--muted); }

  /* Hero — full bleed */
  .hero {
    padding-top: clamp(80px, 12vw, 200px);
    padding-bottom: clamp(60px, 8vw, 120px);
    border-bottom: 1px solid var(--ink);
  }
  .hero__meta { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: clamp(40px, 5vw, 80px); }
  .hero__meta .ink { color: var(--ink); }
  .hero__ttl {
    font-size: clamp(72px, 14vw, 240px);
    line-height: 0.86;
    letter-spacing: -0.055em;
    font-weight: 600;
    text-wrap: balance;
  }
  .hero__ttl em { color: var(--accent); font-style: normal; }
  .hero__sub {
    margin-top: clamp(32px, 4vw, 60px);
    display: grid;
    grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);
    gap: clamp(40px, 5vw, 80px);
    align-items: end;
  }
  .hero__sub-lede { font-size: clamp(20px, 1.8vw, 28px); line-height: 1.3; max-width: 24ch; letter-spacing: -0.012em; }
  .hero__sub-ctas { display: flex; gap: 14px; flex-wrap: wrap; }

  /* Brutal button */
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 20px;
    border: 1px solid var(--ink);
    background: var(--ink);
    color: var(--bg);
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.18s, color 0.18s;
  }
  .btn:hover { background: var(--bg); color: var(--ink); }
  .btn--accent { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn--accent:hover { background: transparent; color: var(--accent); }
  .btn--ghost { background: transparent; color: var(--ink); border-color: var(--ink); }
  .btn--ghost:hover { background: var(--ink); color: var(--bg); }

  /* Dense lists */
  .lst { display: grid; gap: 0; }
  .lst__item {
    display: grid; grid-template-columns: 40px 1fr;
    gap: 16px;
    padding: 14px 0;
    border-top: 1px solid var(--hair);
    align-items: baseline;
  }
  .lst__item:last-child { border-bottom: 1px solid var(--hair); }
  .lst__n { font-family: var(--font-mono); font-size: 12px; color: var(--accent); padding-top: 2px; }
  .lst__t { font-size: 17px; line-height: 1.45; }
  .lst__a { color: var(--muted); font-size: 14px; margin-top: 4px; }

  /* Steps */
  .steps { display: grid; gap: 0; }
  .step {
    display: grid; grid-template-columns: 60px 1fr;
    gap: 18px;
    padding: 18px 0;
    border-top: 1px solid var(--hair);
  }
  .step:last-child { border-bottom: 1px solid var(--hair); }
  .step__n { font-family: var(--font-mono); font-size: 12px; color: var(--muted); padding-top: 6px; }
  .step__t { font-weight: 500; font-size: 19px; }
  .step__d { margin-top: 4px; color: var(--ink); font-size: 15.5px; line-height: 1.5; }

  /* AI table */
  .ai { display: grid; grid-template-columns: max-content 1fr 1fr; column-gap: 24px; row-gap: 0; }
  .ai > * { padding: 12px 0; border-top: 1px solid var(--hair); font-size: 15.5px; }
  .ai > :nth-last-child(-n+3) { border-bottom: 1px solid var(--hair); }
  .ai__art { font-weight: 500; }
  .ai__before { color: var(--muted); text-decoration: line-through; }
  .ai__now { color: var(--accent); }

  /* Marquee */
  .marquee {
    overflow: hidden;
    border-top: 1px solid var(--ink);
    border-bottom: 1px solid var(--ink);
    margin: clamp(60px, 8vw, 120px) calc(var(--pad-x) * -1) 0;
    padding: 0 var(--pad-x);
  }
  .marquee__track {
    display: inline-flex;
    gap: 60px;
    padding: 16px 0;
    white-space: nowrap;
    animation: scroll 50s linear infinite;
    font-family: var(--font-sans);
    font-weight: 600;
    font-size: clamp(40px, 6vw, 88px);
    letter-spacing: -0.03em;
  }
  .marquee:hover .marquee__track { animation-play-state: paused; }
  .marquee__sep { color: var(--accent); }
  @keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  /* Bottom */
  .bottom {
    padding-top: 32px;
    padding-bottom: 40px;
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  @media (max-width: 900px) {
    .entry { grid-template-columns: 1fr; gap: 24px; }
    .entry__n { position: static; padding-top: 0; }
    .hero__sub { grid-template-columns: 1fr; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="brutal-stark.jsx"></script>
</head>
<body>
<div id="root"></div>
</body>
</html>
